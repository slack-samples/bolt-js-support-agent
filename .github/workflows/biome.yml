name: Linting and formatting validation using biome

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        directory:
          - js/openai-agents-sdk
          - js/claude-agent-sdk
          - ts/openai-agents-sdk
          - ts/claude-agent-sdk
    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Lint and check formatting with biome
        run: npm run lint
      - name: TypeScript compilation check
        if: startsWith(matrix.directory, 'ts/')
        run: npm run build
